<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - كافيتيريا Fulla</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrapper {
            background-image: url('https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?q=80&w=1980&auto=format&fit=crop');
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo" style="justify-content:center; margin-bottom:20px;">
                <i class="fa-solid fa-utensils"></i>
                <span>كافيتيريا Fulla</span>
            </div>

            <h1>مرحباً بك 👋</h1>
            <p class="subtitle">سجّل دخولك للاستمتاع بأشهى المأكولات</p>

            <button type="button" class="google-btn" id="loginBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                تسجيل الدخول عبر Google
            </button>

            <div id="message" style="margin-top:20px; font-weight:600; font-size:0.95rem;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-check-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3-Ljb1uKSD4VhgavLUmwebqVivLxFIis",
            authDomain: "cafeteria-app-82268.firebaseapp.com",
            databaseURL: "https://cafeteria-app-82268-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cafeteria-app-82268",
            storageBucket: "cafeteria-app-82268.appspot.com",
            messagingSenderId: "457381739769",
            appId: "1:457381739769:web:409cb927ef54368cb3f628"
        };

        firebase.initializeApp(firebaseConfig);

        firebase.appCheck().activate(
            new firebase.appCheck.ReCaptchaV3Provider('6LcjCaUsAAAAACPx5JTY_kbMM7x766UiScBBIEkr'),
            true
        );

        const auth = firebase.auth();
        const database = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();
        const messageDiv = document.getElementById('message');
        const loginBtn = document.getElementById('loginBtn');

        let loginHandled = false;

        function setMessage(text, color) {
            messageDiv.textContent = text;
            messageDiv.style.color = color;
        }

        async function handleLoginSuccess(user) {
            if (loginHandled) return;
            loginHandled = true;

            try {
                const userRef = database.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();

                await userRef.update({
                    lastLoginTime: new Date().toISOString(),
                    email: user.email || "",
                    displayName: user.displayName || "مستخدم",
                    role: userData && userData.role ? userData.role : "user"
                });
            } catch (e) {
                console.error('Database update error:', e);
            }

            setMessage('✅ تم تسجيل الدخول! جاري التحويل...', '#43a047');
            window.location.replace('menu.html');
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await handleLoginSuccess(user);
            } else {
                loginBtn.disabled = false;
            }
        });

        auth.getRedirectResult()
            .then(async (result) => {
                if (result && result.user) {
                    await handleLoginSuccess(result.user);
                }
            })
            .catch((err) => {
                console.error('Redirect error:', err);
                loginBtn.disabled = false;

                let msg = '❌ حدث خطأ أثناء استكمال تسجيل الدخول';
                if (err.code === 'auth/network-request-failed') msg = '❌ فشل الاتصال بالشبكة';
                else if (err.code === 'auth/unauthorized-domain') msg = '❌ الدومين غير مصرح به في Firebase';

                setMessage(msg, 'var(--accent-primary)');
            });

        loginBtn.addEventListener('click', async function () {
            setMessage('⏳ جاري تسجيل الدخول...', 'var(--accent-secondary)');
            loginBtn.disabled = true;

            try {
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                const isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
                const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent);

                if (isIOS) {
                    await auth.signInWithRedirect(provider);
                    return;
                }

                if (isMobile) {
                    await auth.signInWithRedirect(provider);
                    return;
                }

                const result = await auth.signInWithPopup(provider);
                if (result && result.user) {
                    await handleLoginSuccess(result.user);
                }
            } catch (error) {
                console.error('Login error:', error);
                loginBtn.disabled = false;

                let msg = '❌ حدث خطأ، حاول مجدداً';
                if (error.code === 'auth/popup-closed-by-user') msg = '❌ تم إغلاق نافذة الدخول';
                else if (error.code === 'auth/network-request-failed') msg = '❌ فشل الاتصال بالشبكة';
                else if (error.code === 'auth/popup-blocked') msg = '❌ تم حظر النافذة';
                else if (error.code === 'auth/cancelled-popup-request') msg = '❌ تم إلغاء طلب الدخول السابق';

                setMessage(msg, 'var(--accent-primary)');
            }
        });
    </script>
</body>
</html>
