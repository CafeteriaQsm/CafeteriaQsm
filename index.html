<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-check-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3-Ljb1uKSD4VhgavLUmwebqVivLxFIis",
        authDomain: "cafeteria-app-82268.firebaseapp.com",
        databaseURL: "https://cafeteria-app-82268-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "cafeteria-app-82268",
        storageBucket: "cafeteria-app-82268.appspot.com",
        messagingSenderId: "457381739769",
        appId: "1:457381739769:web:409cb927ef54368cb3f628"
    };

    firebase.initializeApp(firebaseConfig);
    firebase.appCheck().activate(
        new firebase.appCheck.ReCaptchaV3Provider('6LcjCaUsAAAAACPx5JTY_kbMM7x766UiScBBIEkr'),
        true
    );

    const auth = firebase.auth();
    const database = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    // 1. مراقبة حالة المستخدم للتحويل التلقائي للزوار السابقين
    auth.onAuthStateChanged(user => {
        if (user && !window.isLoggingIn) {
            window.location.href = 'menu.html';
        }
    });

    // 2. دالة تسجيل الدخول (تمت إزالة التوقفات لتناسب الآيفون)
    window.loginWithGoogle = function () {
        window.isLoggingIn = true; // منع التحويل المبكر
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = '⏳ جاري تسجيل الدخول...';
        messageDiv.style.color = 'var(--accent-secondary, #666)';

        // استدعاء Popup فوراً عند النقر بدون أي Await لتجاوز حظر Safari
        auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                
                // 3. تحديث الداتا بيز في الخلفية (بدون Await لعدم تعطيل التحويل)
                const userRef = database.ref('users/' + user.uid);
                userRef.once('value').then(snapshot => {
                    const userData = snapshot.val();
                    userRef.update({
                        lastLoginTime: new Date().toISOString(),
                        email: user.email,
                        displayName: user.displayName || "مستخدم",
                        role: userData && userData.role ? userData.role : "user"
                    });
                }).catch(err => console.error("خطأ في حفظ البيانات:", err));

                // 4. التوجيه المباشر للصفحة (سيحل مشكلة الحاجة للـ Refresh)
                window.location.href = 'menu.html';
            })
            .catch((error) => {
                window.isLoggingIn = false;
                let msg = '❌ حدث خطأ، حاول مجدداً';
                
                if (error.code === 'auth/popup-closed-by-user') {
                    msg = '❌ تم إغلاق نافذة الدخول';
                } else if (error.code === 'auth/popup-blocked') {
                    msg = '❌ متصفحك يمنع النوافذ المنبثقة، يرجى السماح بها';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = '❌ فشل الاتصال بالشبكة';
                }

                messageDiv.style.color = 'red';
                messageDiv.textContent = msg;
                console.error("Login Error:", error);
            });
    };
</script>
