<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - كافيتيريا Fulla</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-wrapper {
            background-image: url('https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?q=80&w=1980&auto=format&fit=crop');
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo" style="justify-content:center; margin-bottom:20px;">
                <i class="fa-solid fa-utensils"></i>
                <span>كافيتيريا Fulla</span>
            </div>

            <h1>مرحباً بك</h1>
            <p class="subtitle">سجّل دخولك للاستمتاع بأشهى المأكولات</p>

            <button type="button" class="google-btn" id="loginBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                تسجيل الدخول عبر Google
            </button>

            <div id="message" style="margin-top:20px; font-weight:600; font-size:0.95rem;"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3-Ljb1uKSD4VhgavLUmwebqVivLxFIis",
            authDomain: "cafeteria-app-82268.firebaseapp.com",
            databaseURL: "https://cafeteria-app-82268-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cafeteria-app-82268",
            storageBucket: "cafeteria-app-82268.appspot.com",
            messagingSenderId: "457381739769",
            appId: "1:457381739769:web:409cb927ef54368cb3f628"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const database = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        const loginBtn = document.getElementById("loginBtn");
        const messageDiv = document.getElementById("message");

        let handled = false;
        let authChecked = false;

        function setMessage(text, color) {
            messageDiv.textContent = text;
            messageDiv.style.color = color;
        }

        async function saveUserData(user) {
            const userRef = database.ref("users/" + user.uid);
            const snapshot = await userRef.once("value");
            const oldData = snapshot.val();

            await userRef.update({
                lastLoginTime: new Date().toISOString(),
                email: user.email || "",
                displayName: user.displayName || "مستخدم",
                role: oldData && oldData.role ? oldData.role : "user"
            });
        }

        async function finishLogin(user) {
            if (handled) return;
            handled = true;

            try {
                setMessage("✅ تم تسجيل الدخول! جاري التحويل...", "#43a047");
                await saveUserData(user);
            } catch (e) {
                console.error("saveUserData error:", e);
            }

            localStorage.removeItem("login_in_progress");
            window.location.replace("menu.html");
        }

        auth.onAuthStateChanged(async (user) => {
            authChecked = true;

            if (user) {
                await finishLogin(user);
                return;
            }

            loginBtn.disabled = false;

            if (localStorage.getItem("login_in_progress") === "1") {
                setMessage("❌ لم يكتمل تسجيل الدخول. حاول مرة أخرى.", "#e53935");
                localStorage.removeItem("login_in_progress");
            }
        });

        auth.getRedirectResult()
            .then(async (result) => {
                if (result && result.user) {
                    await finishLogin(result.user);
                }
            })
            .catch((error) => {
                console.error("Redirect error:", error);
                loginBtn.disabled = false;
                localStorage.removeItem("login_in_progress");

                let msg = "❌ فشل استكمال تسجيل الدخول";
                if (error.code === "auth/unauthorized-domain") {
                    msg = "❌ هذا الدومين غير مضاف في Firebase Authorized Domains";
                } else if (error.code === "auth/network-request-failed") {
                    msg = "❌ فشل الاتصال بالشبكة";
                } else if (error.code === "auth/web-storage-unsupported") {
                    msg = "❌ المتصفح لا يدعم التخزين المطلوب لتسجيل الدخول";
                }

                setMessage(msg, "#e53935");
            });

        loginBtn.addEventListener("click", async () => {
            loginBtn.disabled = true;
            setMessage("⏳ جاري تسجيل الدخول...", "#ff9800");

            try {
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

                const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile/i.test(navigator.userAgent);

                if (isMobile) {
                    localStorage.setItem("login_in_progress", "1");
                    await auth.signInWithRedirect(provider);
                } else {
                    const result = await auth.signInWithPopup(provider);
                    if (result && result.user) {
                        await finishLogin(result.user);
                    }
                }
            } catch (error) {
                console.error("Login error:", error);
                loginBtn.disabled = false;
                localStorage.removeItem("login_in_progress");

                let msg = "❌ حدث خطأ، حاول مجددًا";
                if (error.code === "auth/popup-closed-by-user") msg = "❌ تم إغلاق نافذة تسجيل الدخول";
                else if (error.code === "auth/popup-blocked") msg = "❌ المتصفح حظر نافذة تسجيل الدخول";
                else if (error.code === "auth/network-request-failed") msg = "❌ فشل الاتصال بالشبكة";

                setMessage(msg, "#e53935");
            }
        });

        setTimeout(() => {
            if (!handled && localStorage.getItem("login_in_progress") === "1" && authChecked) {
                loginBtn.disabled = false;
                setMessage("❌ تعذر إكمال تسجيل الدخول على الهاتف. تأكد من إعدادات Firebase والدومين.", "#e53935");
                localStorage.removeItem("login_in_progress");
            }
        }, 5000);
    </script>
</body>
</html>
