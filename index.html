<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - كافتيريا القاسمي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="fa-solid fa-utensils"></i>
                <span>كافيتيريا القاسمي</span>
            </div>
            
            <h1>مرحباً بك</h1>
            <p class="subtitle">سجل دخولك للاستمتاع بأشهى المأكولات</p>

            <button type="button" class="google-btn" onclick="loginWithGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                تسجيل الدخول عبر Google
            </button>
            
            <div id="message" style="margin-top: 20px; font-weight: 600;"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3-Ljb1uKSD4VhgavLUmwebqVivLxFIis",
            authDomain: "cafeteria-app-82268.firebaseapp.com",
            databaseURL: "https://cafeteria-app-82268-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cafeteria-app-82268",
            storageBucket: "cafeteria-app-82268.appspot.com",
            messagingSenderId: "457381739769",
            appId: "1:457381739769:web:409cb927ef54368cb3f628"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Check if already logged in
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'menu.html';
            }
        });

        // Google Login Provider
        const provider = new firebase.auth.GoogleAuthProvider();

        window.loginWithGoogle = async function () {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = '⏳ جاري تسجيل الدخول...';
            messageDiv.style.color = 'var(--accent-secondary)';

            try {
                // Set persistence
                await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
                
                // Sign in with Google
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                // Create or update user node in DB
                const userRef = database.ref('users/' + user.uid);
                
                // Fetch existing details
                const snapshot = await userRef.once('value');
                const userData = snapshot.val();
                
                let updateData = {
                    lastLoginTime: new Date().toISOString(),
                    email: user.email,
                    displayName: user.displayName || "مستخدم جديد",
                    role: userData && userData.role ? userData.role : "user" // retain admin role if exists
                };

                await userRef.update(updateData);
                
                if (userData && userData.lastLoginTime) {
                    localStorage.setItem('lastLoginTime', userData.lastLoginTime);
                }

                messageDiv.style.color = '#2e7d32'; // Success green
                messageDiv.textContent = '✅ تم تسجيل الدخول بنجاح! جاري تحويلك...';

                setTimeout(() => {
                    window.location.href = 'menu.html';
                }, 1000);

            } catch (error) {
                console.error(error);
                let errorMessage = '❌ حدث خطأ، لم يكتمل تسجيل الدخول';
                if (error.code === 'auth/popup-closed-by-user') {
                    errorMessage = '❌ تم إغلاق نافذة الدخول قبل إتمام العملية';
                } else if (error.code === 'auth/network-request-failed') {
                    errorMessage = '❌ فشل الاتصال بالشبكة، يرجى المحاولة لاحقاً';
                }
                messageDiv.style.color = 'var(--accent-primary)'; // Error red
                messageDiv.textContent = errorMessage;
            }
        };
    </script>
</body>
</html>
