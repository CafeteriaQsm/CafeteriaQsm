<body>

    <div class="admin-header">
        <div class="header-content">

    <div class="container" style="padding:40px 20px;">
        <div class="dashboard-stats">

            <div class="stat-card"><i class="fas fa-clock" style="color:var(--accent-tertiary);"></i><h3 id="pendingOrders" style="color:var(--text-primary);">0</h3><p>قيد المعالجة</p></div>
            <div class="stat-card"><i class="fas fa-check-circle" style="color:#27ae60;"></i><h3 id="completedOrders" style="color:var(--text-primary);">0</h3><p>مكتملة</p></div>

                    <option value="جاري التحضير">جاري التحضير</option>

                    <option value="تم التسليم">تم التسليم</option>

            <div style="flex:1;min-width:250px;">
                <label for="searchOrder" style="display:block;margin-bottom:10px;color:var(--text-secondary);">بحث برقم الطلب</label>
                <input type="text" id="searchOrder" placeholder="أدخل رقم الطلب" style="width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-dark);color:var(--text-primary);">

        <div class="orders-container" id="ordersContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:25px;align-items:start;">

                    <p style="color:var(--text-secondary);">لم يتم العثور على أي طلبات حتى الآن</p>
                </div></div>
    </div>

    <div id="mealsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;padding:20px;overflow-y:auto;">
        <div style="background:var(--bg-card);max-width:900px;margin:40px auto;border-radius:var(--radius-md);padding:30px;border:1px solid var(--border-color);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;border-bottom:1px solid var(--border-color);padding-bottom:15px;">
                <h2 style="color:var(--accent-secondary);"><i class="fas fa-list"></i> إدارة توفر الوجبات</h2>
                <button class="btn-outline" onclick="closeMealsModal()" style="padding:5px 15px;border-color:var(--accent-primary);color:var(--accent-primary);">إغلاق</button>
            </div>
            <p style="color:var(--text-secondary);margin-bottom:20px;">قم بالضغط على الزر المقابل لأي وجبة لإيقاف بيعها مؤقتاً.</p>
            <div id="mealsListContainer" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;"></div>
        </div>
    </div>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-check-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // =========================================
        // FIREBASE CONFIGS
        // =========================================

        // المشروع القديم الحالي للوحة الأدمن
        const oldFirebaseConfig = {
            apiKey: "AIzaSyC3-Ljb1uKSD4VhgavLUmwebqVivLxFIis",
            authDomain: "cafeteria-app-82268.firebaseapp.com",
            databaseURL: "https://cafeteria-app-82268-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cafeteria-app-82268",
            storageBucket: "cafeteria-app-82268.appspot.com",
            messagingSenderId: "457381739769",
            appId: "1:457381739769:web:409cb927ef54368cb3f628"
        };

        // المشروع الجديد الخاص بالتطبيق الحالي
        const newFirebaseConfig = {
            apiKey: "AIzaSyAkCrTm0ZuQS7l8prN0JQnhWD4Pc2j5QkQ",
            authDomain: "fulla-caffe.firebaseapp.com",
            projectId: "fulla-caffe",
            storageBucket: "fulla-caffe.firebasestorage.app",
            messagingSenderId: "557692512095",
            appId: "1:557692512095:web:790f94d299b03a09f138ea"
        };

        // ✅ التطبيق القديم يبقى كما هو
        const oldApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(oldFirebaseConfig);

        // ✅ تطبيق جديد منفصل للـ Firestore بدون حذف القديم
        const newApp = firebase.apps.find(app => app.name === "fullaCaffeAdmin")
            || firebase.initializeApp(newFirebaseConfig, "fullaCaffeAdmin");

        // ✅ App Check للمشروع القديم فقط لأنه كان موجود أصلاً
        oldApp.appCheck().activate(
            new firebase.appCheck.ReCaptchaV3Provider('6LcjCaUsAAAAACPx5JTY_kbMM7x766UiScBBIEkr'),
            true
        );

        // مراجع المشروع القديم
        const db = oldApp.database();
        const auth = oldApp.auth();

        // مراجع المشروع الجديد
        const newAuth = newApp.auth();
        const firestore = newApp.firestore();

        // =========================================
        // DOM REFERENCES
        // =========================================
        const ordersContainer = document.getElementById("ordersContainer");
        const statusFilter = document.getElementById("statusFilter");
        const searchOrder = document.getElementById("searchOrder");
        const totalOrdersElement = document.getElementById("totalOrders");
        const pendingOrdersElement = document.getElementById("pendingOrders");
        const completedOrdersElement = document.getElementById("completedOrders");

        let allOrders = [];
        let unavailableMeals = {};
        let oldOrdersReady = false;
        let firestoreOrdersReady = false;
        let oldOrdersCache = [];
        let firestoreOrdersCache = [];

        const ADMIN_EMAIL = "mohamad.36669@gmail.com";

        // ⚠️ مهم جداً:
        // حط نفس كلمة سر الأدمن الموجودة داخل مشروع fulla-caffe
        // إذا ما كان في حساب أدمن داخل fulla-caffe لازم تنشئه أولاً في Firebase Authentication
        const FULLA_ADMIN_PASSWORD = "PUT_THE_FULLA_ADMIN_PASSWORD_HERE";

        // =========================================
        // AUTH GUARDS
        // =========================================
        auth.onAuthStateChanged(async user => {
            if (!user) {
                alert("يجب تسجيل الدخول أولاً");
                window.location.href = 'index.html';
                return;
            }

            if (user.email !== ADMIN_EMAIL) {
                alert("غير مصرح لك بالدخول لهذه الصفحة");
                window.location.href = 'index.html';
                return;
            }

            try {
                await ensureFullaAdminAuth();
                startOldRealtimeListeners();
                startFirestoreListeners();
            } catch (error) {
                console.error("Fulla auth failed:", error);
                showNotification("فشل ربط لوحة الأدمن مع قاعدة التطبيق الجديدة. تأكد من حساب الأدمن وكلمة المرور في مشروع fulla-caffe.", "error");
                startOldRealtimeListeners();
            }
        });

        async function ensureFullaAdminAuth() {
            const current = newAuth.currentUser;
            if (current && current.email === ADMIN_EMAIL) return current;

            if (!FULLA_ADMIN_PASSWORD || FULLA_ADMIN_PASSWORD === "PUT_THE_FULLA_ADMIN_PASSWORD_HERE") {
                throw new Error("FULLA_ADMIN_PASSWORD is not configured.");
            }

            const credential = await newAuth.signInWithEmailAndPassword(ADMIN_EMAIL, FULLA_ADMIN_PASSWORD);
            return credential.user;
        }

        // =========================================
        // HELPERS
        // =========================================
        function safeNum(v) {
            const n = Number(v);
            return Number.isFinite(n) ? n : 0;
        }

        function parsePickupToMinutes(t) {
            if (!t || typeof t !== "string" || !t.includes(":")) return 999999;
            const [hh, mm] = t.split(":").map(x => parseInt(x, 10));
            return (!Number.isFinite(hh) || !Number.isFinite(mm)) ? 999999 : hh * 60 + mm;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            try {
                if (typeof timestamp?.toDate === "function") {
                    return timestamp.toDate().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                }
                return new Date(timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return 'غير محدد';
            }
        }

        function formatOrderCode(order) {
            const code = order.numericOrderId ?? order.code ?? order.orderNumber ?? order.id;
            return code ? String(code).replace(/[^\d]/g, '') || String(code) : 'N/A';
        }

        function normalizeTimestamp(value) {
            if (!value) return null;
            if (typeof value?.toDate === "function") return value.toDate();
            const parsed = new Date(value);
            return Number.isNaN(parsed.getTime()) ? null : parsed;
        }

        function normalizeItems(items) {
            if (Array.isArray(items)) return items;
            return [];
        }

        function normalizeOldOrder(order, id) {
            return {
                id,
                source: "rtdb",
                code: order.code || order.numericOrderId || id,
                numericOrderId: order.numericOrderId || order.code || null,
                status: order.status || "قيد المعالجة",
                pickupTime: order.pickupTime || "",
                total: safeNum(order.total ?? order.totalAmount ?? 0),
                timestamp: order.timestamp || order.createdAt || null,
                phone: order.phone || order.customerPhone || "",
                email: order.email || order.userEmail || "",
                notes: order.notes || "",
                studentName: order.studentName || order.username || order.name || order.customerName || "",
                items: normalizeItems(order.items || order.cart),
                raw: order
            };
        }

        function normalizeFirestoreOrder(doc) {
            const data = doc.data() || {};
            return {
                id: doc.id,
                source: "firestore",
                code: data.numericOrderId || data.code || data.orderNumber || doc.id,
                numericOrderId: data.numericOrderId || data.code || null,
                status: data.status || "قيد المعالجة",
                pickupTime: data.pickupTime || "",
                total: safeNum(data.totalAmount ?? data.total ?? 0),
                timestamp: data.createdAt || data.updatedAt || null,
                phone: data.customerPhone || data.phone || "",
                email: data.userEmail || data.email || "",
                notes: data.notes || "",
                studentName: data.customerName || data.studentName || data.username || data.name || "",
                items: normalizeItems(data.items),
                raw: data
            };
        }

        function getStudentName(order) {
            return (order.studentName || order.username || order.name || "").trim() || "غير محدد";
        }

        function getItemQty(item) {
            return safeNum(item.quantity ?? item.qty ?? 1) || 1;
        }

        function getItemLineTotal(item) {
            const qty = getItemQty(item);
            const lt = Number(item.lineTotal ?? item.totalPrice);
            if (Number.isFinite(lt) && lt > 0) return lt;
            const up = Number(item.unitPrice);
            if (Number.isFinite(up) && up > 0) return up * qty;
            const p = Number(item.price);
            if (Number.isFinite(p) && p > 0) return p * qty;
            return 0;
        }

        function getItemUnitPrice(item) {
            const up = Number(item.unitPrice);
            if (Number.isFinite(up) && up > 0) return up;
            const p = Number(item.price);
            if (Number.isFinite(p) && p > 0) return p;
            return 0;
        }

        function showNotification(message, type = "success") {
            const n = document.createElement("div");
            n.textContent = message;
            n.className = "notification " + type;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function showEmptyState() {
            ordersContainer.innerHTML = `
                <div class="order-summary" style="grid-column:1/-1;text-align:center;padding:60px 20px;">
                    <i class="fas fa-clipboard-list" style="font-size:4rem;color:var(--border-color);margin-bottom:20px;"></i>
                    <h3>لا توجد طلبات</h3>
                    <p style="color:var(--text-secondary);">لم يتم العثور على أي طلبات حتى الآن</p>
                </div>`;
            totalOrdersElement.textContent = "0";
            pendingOrdersElement.textContent = "0";
            completedOrdersElement.textContent = "0";
        }

        function mergeOrdersAndRender() {
            allOrders = [...oldOrdersCache, ...firestoreOrdersCache];

            let totalOrders = allOrders.length;
            let pendingOrders = 0;
            let completedOrders = 0;

            allOrders.forEach(order => {
                if (["قيد المعالجة", "جاري التحضير", "جاهز"].includes(order.status)) pendingOrders++;
                else if (order.status === "تم التسليم") completedOrders++;
            });

            totalOrdersElement.textContent = String(totalOrders);
            pendingOrdersElement.textContent = String(pendingOrders);
            completedOrdersElement.textContent = String(completedOrders);

            if (!allOrders.length) {
                showEmptyState();
                return;
            }

            applyFilters();
        }

        // =========================================
        // OLD REALTIME DATABASE LISTENERS (بدون حذف القديم)
        // =========================================
        function startOldRealtimeListeners() {
            db.ref("orders").on("value", snapshot => {
                oldOrdersCache = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const order = child.val() || {};
                        oldOrdersCache.push(normalizeOldOrder(order, child.key));
                    });
                }
                oldOrdersReady = true;
                mergeOrdersAndRender();
            });

            db.ref('settings/unavailable_meals').on('value', snap => {
                unavailableMeals = snap.val() || {};
                if (document.getElementById('mealsModal').style.display === 'block') renderMealsManager();
            });
        }

        // =========================================
        // NEW FIRESTORE LISTENERS (الطلبات الجديدة)
        // =========================================
        function startFirestoreListeners() {
            firestore.collection("orders")
                .orderBy("createdAt", "desc")
                .onSnapshot(snapshot => {
                    firestoreOrdersCache = snapshot.docs.map(normalizeFirestoreOrder);
                    firestoreOrdersReady = true;
                    mergeOrdersAndRender();
                }, error => {
                    console.error("Firestore listener error:", error);
                    showNotification("تعذر تحميل طلبات Firestore الجديدة", "error");
                });
        }

        // =========================================
        // MEALS MANAGEMENT
        // =========================================
        const allMealsList = [
            "شاورما","شنيتسل","صدر دجاج","برجر","كباب","نقنيق","فلافل",
            "بطاطا بشميل","بيتسا","رفيولي بشميل","صدر دجاج بشميل",
            "مسحب بالفرن","جولش","شرائح عجل بالفرن","شرائح دجاج بالفرن",
            "فتوش بالجبن","تبولة","سلطة عربية","سلطة صدر دجاج","سلطة طونا",
            "عجه","بستراما","لبنة","جبنة صفراء","توست لبنة","توست طونه","لفة درزية",
            "معجنات بيتزا","معجنات زعتر","معجنات لحمه عجل","معجنات لحمه جاج",
            "معجنات سبانخ","معجنات طونه","معجنات نقنيق","كبة",
            "سجاريوت لحمه","سجاريوت بطاطا","معجنات جبنه بيضا","معجنات زيتون","بطاطا",
            "اي مشروب بارد","HogoMogo","فيوزتي","ريدبول","اولفيرا","اكس ال","بلو",
            "ماء","سحلب","ليمونادا","اسبرسو","نسكافيه","هفوخ","شاي"
        ];

        function openMealsModal() {
            document.getElementById('mealsModal').style.display = 'block';
            renderMealsManager();
        }

        function closeMealsModal() {
            document.getElementById('mealsModal').style.display = 'none';
        }

        function renderMealsManager() {
            const container = document.getElementById('mealsListContainer');
            if (!container) return;
            container.innerHTML = '';

            allMealsList.forEach(meal => {
                const isUnavailable = unavailableMeals[meal] === true;
                const card = document.createElement('div');
                card.style.cssText = `background:rgba(255,255,255,0.02);border:1px solid ${isUnavailable ? 'var(--accent-primary)' : 'var(--border-color)'};border-radius:var(--radius-sm);padding:15px;display:flex;flex-direction:column;gap:10px;text-align:center;`;
                card.innerHTML = `
                    <div style="font-weight:bold;font-size:1.1rem;color:${isUnavailable ? 'var(--text-secondary)' : 'var(--text-primary)'}">${meal}</div>
                    <div style="font-size:0.85rem;margin-bottom:5px;color:${isUnavailable ? 'var(--accent-primary)' : '#27ae60'}">${isUnavailable ? '<i class="fas fa-times-circle"></i> غير متوفر' : '<i class="fas fa-check-circle"></i> متوفر'}</div>
                    <button class="${isUnavailable ? 'btn-outline' : 'btn-primary'}" style="${isUnavailable ? 'border-color:#27ae60;color:#27ae60;width:100%' : 'background-color:var(--accent-primary);border:none;width:100%;'}" onclick="toggleMealAvailability('${meal}', ${!isUnavailable})">
                        ${isUnavailable ? 'تفعيل الوجبة' : 'تعطيل'}
                    </button>`;
                container.appendChild(card);
            });
        }

        function toggleMealAvailability(meal, setUnavailable) {
            db.ref('settings/unavailable_meals/' + meal).set(setUnavailable ? true : null)
                .then(() => showNotification(setUnavailable ? `تم تعطيل ${meal}` : `تم تفعيل ${meal}`, "success"))
                .catch(() => showNotification("فشل في تحديث حالة الوجبة", "error"));
        }

        // =========================================
        // FILTERS
        // =========================================
        function applyFilters() {
            const statusValue = statusFilter.value;
            const searchValue = searchOrder.value.trim();

            let filteredOrders = allOrders.filter(order => {
                const statusMatch = statusValue === "all" || order.status === statusValue;
                const codeText = formatOrderCode(order);
                const searchMatch = !searchValue || codeText.includes(searchValue);
                return statusMatch && searchMatch;
            });

            filteredOrders.sort((a, b) => {
                const am = parsePickupToMinutes(a.pickupTime);
                const bm = parsePickupToMinutes(b.pickupTime);
                if (am !== bm) return am - bm;

                const ad = normalizeTimestamp(a.timestamp);
                const bd = normalizeTimestamp(b.timestamp);
                return (ad?.getTime() || 0) - (bd?.getTime() || 0);
            });

            displayOrders(filteredOrders);
        }

        // =========================================
        // DISPLAY ORDERS
        // =========================================
        function displayOrders(orders) {
            ordersContainer.innerHTML = "";
            if (!orders || orders.length === 0) {
                showEmptyState();
                return;
            }

            orders.forEach(order => {
                const items = normalizeItems(order.items);
                const orderCode = formatOrderCode(order);

                const itemsList = items.map(item => {
                    const qty = getItemQty(item);
                    const unit = getItemUnitPrice(item);
                    const lineTotal = getItemLineTotal(item);

                    const metaParts = [];
                    if (item.size && String(item.size).trim()) metaParts.push(`<span style="background:rgba(212,175,55,0.12);color:var(--accent-secondary);padding:2px 8px;border-radius:4px;font-size:0.78rem;">📏 ${item.size}</span>`);
                    if (item.breadType && String(item.breadType).trim()) metaParts.push(`<span style="background:rgba(255,255,255,0.06);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:0.78rem;">🍞 ${item.breadType}</span>`);

                    const extrasHtml = (item.extras && item.extras.length)
                        ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">
                            ${item.extras.map(e => `<span style="background:rgba(255,255,255,0.05);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:0.78rem;">+ ${e}</span>`).join('')}
                           </div>` : '';

                    const itemNotesHtml = (item.notes && String(item.notes).trim())
                        ? `<div style="margin-top:6px;padding:6px 10px;background:rgba(230,57,70,0.08);border-right:3px solid var(--accent-primary);border-radius:4px;font-size:0.82rem;color:#ff8a80;">
                            <i class="fas fa-sticky-note" style="margin-left:4px;"></i> ${item.notes}
                           </div>` : '';

                    const metaHtml = metaParts.length ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">${metaParts.join('')}</div>` : '';

                    return `
                        <li style="padding:12px 0;border-bottom:1px solid var(--border-color);">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                                <div style="flex:1;">
                                    <div style="font-weight:700;font-size:1rem;margin-bottom:4px;">${item.name || "عنصر"} <span style="color:var(--accent-primary);">×${qty}</span></div>
                                    ${metaHtml}
                                    ${extrasHtml}
                                    ${itemNotesHtml}
                                </div>
                                <div style="text-align:left;margin-right:12px;flex-shrink:0;">
                                    <div style="font-weight:700;font-size:1rem;color:var(--accent-secondary);">₪${lineTotal}</div>
                                    <div style="font-size:0.78rem;color:var(--text-secondary);">₪${unit} / قطعة</div>
                                </div>
                            </div>
                        </li>`;
                }).join("");

                let statusClass = "status-pending";
                let statusBorder = "#ffb74d";
                if (order.status === "جاري التحضير") { statusClass = "status-preparing"; statusBorder = "#64b5f6"; }
                else if (order.status === "جاهز") { statusClass = "status-ready"; statusBorder = "#81c784"; }
                else if (order.status === "تم التسليم") { statusBorder = "#27ae60"; }

                const actionsHtml = order.source === "firestore"
                    ? `
                        <button class="btn-outline" style="flex:1;padding:9px;font-size:0.85rem;" onclick="updateStatus('${order.id}','firestore')"><i class="fas fa-sync-alt"></i> تحديث</button>
                        <button class="btn-primary" style="flex:1;padding:9px;background:#27ae60;border:none;font-size:0.85rem;" onclick="markAsDelivered('${order.id}','${orderCode}','firestore')"><i class="fas fa-check"></i> تسليم</button>
                        <button class="btn-outline" style="flex:1;padding:9px;font-size:0.85rem;opacity:.6;cursor:not-allowed;" disabled><i class="fas fa-lock"></i> حذف غير متاح</button>
                      `
                    : `
                        <button class="btn-outline" style="flex:1;padding:9px;font-size:0.85rem;" onclick="updateStatus('${order.id}','rtdb')"><i class="fas fa-sync-alt"></i> تحديث</button>
                        <button class="btn-primary" style="flex:1;padding:9px;background:#27ae60;border:none;font-size:0.85rem;" onclick="markAsDelivered('${order.id}','${orderCode}','rtdb')"><i class="fas fa-check"></i> تسليم</button>
                        <button class="btn-primary" style="flex:1;padding:9px;background:var(--accent-primary);border:none;font-size:0.85rem;" onclick="deleteOrder('${order.id}','${orderCode}','rtdb')"><i class="fas fa-trash"></i> حذف</button>
                      `;

                const sourceBadge = order.source === "firestore"
                    ? `<span style="font-size:0.75rem;background:rgba(52,152,219,0.12);color:#64b5f6;padding:4px 8px;border-radius:999px;">Firestore</span>`
                    : `<span style="font-size:0.75rem;background:rgba(241,196,15,0.12);color:#f1c40f;padding:4px 8px;border-radius:999px;">Realtime DB</span>`;

                const card = document.createElement("div");
                card.style.cssText = `background-color:var(--bg-card);border-radius:var(--radius-md);border:1px solid var(--border-color);border-top:3px solid ${statusBorder};overflow:hidden;display:flex;flex-direction:column;transition:box-shadow 0.2s;`;

                card.innerHTML = `
                    <div style="padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.02);gap:10px;">
                        <div style="font-weight:800;font-size:1.15rem;color:var(--accent-secondary);">
                            <i class="fas fa-receipt"></i> #${orderCode}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            ${sourceBadge}
                            <div class="status-badge ${statusClass}">${order.status || "قيد المعالجة"}</div>
                        </div>
                    </div>

                    <div style="padding:12px 20px;background:rgba(230,57,70,0.06);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:10px;">
                        <i class="fas fa-clock" style="color:var(--accent-primary);font-size:1.1rem;"></i>
                        <div>
                            <div style="font-size:0.75rem;color:var(--text-secondary);">وقت الاستلام</div>
                            <div style="font-size:1.3rem;font-weight:800;color:var(--text-primary);">${order.pickupTime || 'غير محدد'}</div>
                        </div>
                        <div style="margin-right:auto;text-align:left;">
                            <div style="font-size:0.75rem;color:var(--text-secondary);">المجموع</div>
                            <div style="font-size:1.2rem;font-weight:800;color:var(--accent-secondary);">₪${safeNum(order.total)}</div>
                        </div>
                    </div>

                    <div style="padding:16px 20px;flex-grow:1;">

                        <div style="background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:12px;margin-bottom:14px;border:1px solid var(--border-color);">
                            <div style="font-weight:700;font-size:1rem;margin-bottom:8px;">
                                <i class="fas fa-user" style="color:var(--accent-secondary);margin-left:6px;"></i>${getStudentName(order)}
                            </div>
                            <div style="display:flex;flex-direction:column;gap:5px;">
                                <span style="font-size:0.85rem;color:var(--text-secondary);"><i class="fas fa-phone" style="margin-left:6px;color:var(--accent-secondary);"></i>${order.phone || "—"}</span>
                                <span style="font-size:0.82rem;color:var(--text-secondary);word-break:break-all;"><i class="fas fa-envelope" style="margin-left:6px;color:var(--accent-secondary);"></i>${order.email || "—"}</span>
                                <span style="font-size:0.80rem;color:var(--text-secondary);"><i class="fas fa-clock" style="margin-left:6px;"></i>${formatDate(order.timestamp)}</span>
                            </div>
                        </div>

                        ${order.notes ? `
                        <div style="margin-bottom:14px;padding:10px 14px;background:rgba(212,175,55,0.08);border-radius:var(--radius-sm);border:1px solid rgba(212,175,55,0.2);">
                            <div style="font-size:0.78rem;color:var(--accent-secondary);margin-bottom:3px;font-weight:700;"><i class="fas fa-sticky-note" style="margin-left:4px;"></i>ملاحظات الطلب</div>
                            <div style="font-size:0.9rem;">${order.notes}</div>
                        </div>` : ''}

                        <div>
                            <div style="font-size:0.78rem;color:var(--text-secondary);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">
                                <i class="fas fa-list" style="margin-left:4px;"></i>العناصر (${items.length})
                            </div>
                            <ul style="list-style:none;margin:0;padding:0;">${itemsList || '<li style="color:var(--text-secondary);">لا توجد عناصر</li>'}</ul>
                        </div>
                    </div>

                    <div style="padding:14px 20px;border-top:1px solid var(--border-color);background:rgba(255,255,255,0.02);">
                        <select id="status-${order.source}-${order.id}" style="width:100%;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-dark);color:var(--text-primary);margin-bottom:10px;font-family:inherit;">
                            <option value="قيد المعالجة" ${order.status === "قيد المعالجة" ? "selected" : ""}>⏳ قيد المعالجة</option>
                            <option value="جاري التحضير" ${order.status === "جاري التحضير" ? "selected" : ""}>🍳 جاري التحضير</option>
                            <option value="جاهز" ${order.status === "جاهز" ? "selected" : ""}>✅ جاهز</option>
                            <option value="تم التسليم" ${order.status === "تم التسليم" ? "selected" : ""}>🎉 تم التسليم</option>
                        </select>
                        <div style="display:flex;gap:8px;">
                            ${actionsHtml}
                        </div>
                    </div>`;
                ordersContainer.appendChild(card);
            });
        }

        // =========================================
        // ORDER ACTIONS
        // =========================================
        function getStatusValue(orderId, source) {
            const sel = document.getElementById(`status-${source}-${orderId}`);
            return sel ? sel.value : "قيد المعالجة";
        }

        function updateStatus(orderId, source) {
            const newStatus = getStatusValue(orderId, source);

            if (source === "firestore") {
                firestore.collection("orders").doc(orderId).update({
                    status: newStatus,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => showNotification(`✅ تم تحديث الحالة إلى "${newStatus}"`, "success"))
                .catch((error) => {
                    console.error(error);
                    showNotification("❌ فشل في تحديث حالة طلب Firestore", "error");
                });
                return;
            }

            db.ref("orders/" + orderId).update({ status: newStatus })
                .then(() => showNotification(`✅ تم تحديث الحالة إلى "${newStatus}"`, "success"))
                .catch(() => showNotification("❌ فشل في تحديث الحالة", "error"));
        }

        function deleteOrder(orderId, code, source) {
            if (source === "firestore") {
                showNotification("حذف طلبات Firestore غير متاح من القواعد الحالية", "error");
                return;
            }

            if (!confirm(`هل أنت متأكد أنك تريد حذف الطلب ${code ? "#" + code : ""} ؟`)) return;
            db.ref("orders/" + orderId).remove()
                .then(() => showNotification("✅ تم حذف الطلب بنجاح", "success"))
                .catch(() => showNotification("❌ فشل في حذف الطلب", "error"));
        }

        function markAsDelivered(orderId, code, source) {
            if (!confirm(`تأكيد: هل تريد وضع الطلب ${code ? "#" + code : ""} كـ "تم التسليم"؟`)) return;

            if (source === "firestore") {
                firestore.collection("orders").doc(orderId).update({
                    status: "تم التسليم",
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => showNotification("✅ تم تحديث حالة طلب Firestore", "success"))
                .catch((error) => {
                    console.error(error);
                    showNotification("❌ فشل في عملية التسليم", "error");
                });
                return;
            }

            db.ref("orders/" + orderId).update({ status: "تم التسليم" })
                .then(() => {
                    showNotification("✅ تم تحديث الحالة", "success");
                    if (!confirm("هل تريد حذف الطلب نهائياً؟")) return;
                    return db.ref("orders/" + orderId).remove().then(() => showNotification("✅ تم حذف الطلب", "success"));
                })
                .catch(() => showNotification("❌ فشل في عملية التسليم", "error"));
        }

        statusFilter.addEventListener('change', applyFilters);
        searchOrder.addEventListener('input', applyFilters);
    </script>
</body></html>
